<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120" fill="none">
  <foreignObject width="600" height="120">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @keyframes fadeInOut {
          0%, 100% { opacity: 0.35; }
          40%, 60% { opacity: 1; }
        }
        @keyframes glowPulse {
          0%, 100% { opacity: 0.25; }
          50% { opacity: 0.6; }
        }
        @keyframes dotDrift {
          0%, 100% { opacity: 0.15; transform: translateY(0px); }
          50% { opacity: 0.4; transform: translateY(-2px); }
        }
        .wrap {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 120px;
          font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
          position: relative;
        }
        .line {
          width: 40px;
          height: 1px;
          background: linear-gradient(90deg, transparent, #5eead4, transparent);
          animation: glowPulse 2.5s ease-in-out infinite;
          margin-bottom: 16px;
        }
        .text {
          font-size: 13px;
          font-weight: 400;
          letter-spacing: 3.5px;
          color: #94a3b8;
          text-transform: lowercase;
          animation: fadeInOut 4s ease-in-out infinite;
        }
        .dot-row {
          display: flex;
          gap: 6px;
          margin-top: 16px;
        }
        .dot {
          width: 3px;
          height: 3px;
          border-radius: 50%;
          background: #5eead4;
        }
        .dot:nth-child(1) { animation: dotDrift 2s ease-in-out infinite; }
        .dot:nth-child(2) { animation: dotDrift 2s ease-in-out 0.3s infinite; }
        .dot:nth-child(3) { animation: dotDrift 2s ease-in-out 0.6s infinite; }
      </style>
      <div class="wrap">
        <div class="line"></div>
        <div class="text">building beyond the noise</div>
        <div class="dot-row">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
