<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="60%" stop-color="#162032"/>
      <stop offset="100%" stop-color="#1b2e3a"/>
    </linearGradient>
    <linearGradient id="dawn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08">
        <animate attributeName="stop-opacity" values="0;0;0.08;0.14;0.14" keyTimes="0;0.3;0.6;0.8;1" dur="6s" fill="freeze"/>
      </stop>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0">
        <animate attributeName="stop-opacity" values="0;0;0.06;0.12;0.12" keyTimes="0;0.4;0.6;0.8;1" dur="6s" fill="freeze"/>
      </stop>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3328"/>
      <stop offset="100%" stop-color="#132a20"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- sky -->
  <rect width="800" height="340" fill="url(#sky)" rx="10"/>
  <!-- dawn warmth rising from horizon -->
  <rect width="800" height="340" fill="url(#dawn)" rx="10"/>
  <rect width="800" height="340" fill="url(#sun)" rx="10"/>

  <!-- stars that slowly fade as dawn arrives -->
  <g>
    <circle cx="90" cy="28" r="1" fill="#e2e8f0" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.15;0.5;0.5;0.1" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="220" cy="15" r="0.7" fill="#cbd5e1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4;0.4;0.08" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="370" cy="32" r="1.1" fill="#e2e8f0" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.1;0.45;0.45;0.07" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="540" cy="20" r="0.8" fill="#cbd5e1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.12;0.5;0.5;0.06" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="670" cy="38" r="0.9" fill="#e2e8f0" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.08;0.35;0.35;0.05" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="750" cy="12" r="0.7" fill="#cbd5e1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.12;0.4;0.4;0.06" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="450" cy="10" r="0.6" fill="#e2e8f0" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.05;0.3;0.3;0.04" dur="6s" fill="freeze"/>
    </circle>
    <circle cx="160" cy="48" r="0.8" fill="#cbd5e1" opacity="0.25">
      <animate attributeName="opacity" values="0.25;0.06;0.25;0.25;0.04" dur="6s" fill="freeze"/>
    </circle>
  </g>

  <!-- distant hill layer -->
  <path d="M0 230 Q80 200 180 215 Q300 190 420 210 Q550 185 680 205 Q740 195 800 210 L800 340 L0 340Z" fill="#15271f" opacity="0.6"/>

  <!-- main hills -->
  <path d="M0 248 Q100 215 220 235 Q380 205 480 228 Q600 200 720 222 Q770 218 800 225 L800 340 L0 340Z" fill="#1a3328" opacity="0.85"/>

  <!-- island/earth circle — the tiny world -->
  <g transform="translate(400, 210)">
    <!-- circular earth base -->
    <circle cx="0" cy="0" r="55" fill="#1e3d2e" stroke="#2d5a3a" stroke-width="0.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.8;0.8" keyTimes="0;0.1;0.35;1" dur="6s" fill="freeze"/>
    </circle>
    <!-- grass on top of circle -->
    <path d="M-55 0 Q-30 -12 0 -8 Q30 -12 55 0" fill="#2d5a3a" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0.9" keyTimes="0;0.1;0.35;1" dur="6s" fill="freeze"/>
    </path>

    <!-- tree left — grows up -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.15;0.3;0.5;1" dur="6s" fill="freeze"/>
      <line x1="-28" y1="-8" x2="-28" y2="-28" stroke="#4a6741" stroke-width="1.8" stroke-linecap="round">
        <animate attributeName="y2" values="-8;-8;-28;-28" keyTimes="0;0.3;0.6;1" dur="6s" fill="freeze"/>
      </line>
      <circle cx="-28" cy="-32" r="0" fill="#3a7a4a" opacity="0.8">
        <animate attributeName="r" values="0;0;7;7" keyTimes="0;0.35;0.6;1" dur="6s" fill="freeze"/>
      </circle>
      <circle cx="-22" cy="-28" r="0" fill="#2d6a3e" opacity="0.6">
        <animate attributeName="r" values="0;0;5;5" keyTimes="0;0.38;0.62;1" dur="6s" fill="freeze"/>
      </circle>
    </g>

    <!-- tree right — grows up -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.18;0.35;0.55;1" dur="6s" fill="freeze"/>
      <line x1="30" y1="-8" x2="30" y2="-24" stroke="#4a6741" stroke-width="1.5" stroke-linecap="round">
        <animate attributeName="y2" values="-8;-8;-24;-24" keyTimes="0;0.33;0.58;1" dur="6s" fill="freeze"/>
      </line>
      <circle cx="30" cy="-27" r="0" fill="#3a7a4a" opacity="0.75">
        <animate attributeName="r" values="0;0;6;6" keyTimes="0;0.38;0.63;1" dur="6s" fill="freeze"/>
      </circle>
    </g>

    <!-- small house — fades in -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.25;0.45;0.65;1" dur="6s" fill="freeze"/>
      <rect x="-6" y="-20" width="14" height="12" fill="#1e293b" rx="1"/>
      <polygon points="-9,-20 1,-30 11,-20" fill="#334155"/>
      <!-- warm window -->
      <rect x="-2" y="-16" width="4" height="4" fill="#fbbf24" opacity="0.7" rx="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
      </rect>
      <rect x="5" y="-16" width="4" height="4" fill="#fbbf24" opacity="0.5" rx="0.5">
        <animate attributeName="opacity" values="0.7;0.4;0.7" dur="4s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- wind turbine — appears then spins -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.3;0.45;0.55;0.7;1" dur="6s" fill="freeze"/>
      <line x1="18" y1="-8" x2="18" y2="-38" stroke="#64748b" stroke-width="1.2"/>
      <g transform="translate(18,-38)">
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="5s" repeatCount="indefinite"/>
        <line x1="0" y1="0" x2="0" y2="-14" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="12.1" y2="7" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-12.1" y2="7" stroke="#94a3b8" stroke-width="1" stroke-linecap="round"/>
      </g>
    </g>

    <!-- solar panel — fades in -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;0;0;0;0.7;0.7" keyTimes="0;0.35;0.5;0.6;0.75;1" dur="6s" fill="freeze"/>
      <g transform="translate(-12, -12) rotate(-20)">
        <rect width="10" height="6" fill="#334155" rx="0.5"/>
        <line x1="2.5" y1="0" x2="2.5" y2="6" stroke="#475569" stroke-width="0.3"/>
        <line x1="5" y1="0" x2="5" y2="6" stroke="#475569" stroke-width="0.3"/>
        <line x1="7.5" y1="0" x2="7.5" y2="6" stroke="#475569" stroke-width="0.3"/>
        <line x1="0" y1="3" x2="10" y2="3" stroke="#475569" stroke-width="0.3"/>
      </g>
    </g>

    <!-- tiny data pulse circling the world -->
    <circle r="1.8" fill="#6C63FF" opacity="0" filter="url(#gl)">
      <animate attributeName="opacity" values="0;0;0;0;0.6;0.6" keyTimes="0;0.5;0.6;0.7;0.8;1" dur="6s" fill="freeze"/>
      <animateMotion dur="4s" begin="4.5s" repeatCount="indefinite" path="M0,-55 A55,55 0 1,1 -0.1,-55"/>
    </circle>
    <circle r="1.2" fill="#a78bfa" opacity="0" filter="url(#gl)">
      <animate attributeName="opacity" values="0;0;0;0;0.4;0.4" keyTimes="0;0.55;0.65;0.75;0.85;1" dur="6s" fill="freeze"/>
      <animateMotion dur="6s" begin="5s" repeatCount="indefinite" path="M0,55 A55,55 0 1,1 0.1,55"/>
    </circle>
  </g>

  <!-- water in foreground -->
  <path d="M0 270 Q200 262 400 270 Q600 278 800 268 L800 300 Q600 290 400 300 Q200 310 0 298Z" fill="#1a3350" opacity="0.3"/>
  <line x1="180" y1="282" x2="215" y2="282" stroke="#94a3b8" stroke-width="0.4" opacity="0.1">
    <animate attributeName="x1" values="180;192;180" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="215;227;215" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="450" y1="278" x2="490" y2="278" stroke="#94a3b8" stroke-width="0.4" opacity="0.08">
    <animate attributeName="x1" values="450;460;450" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="490;500;490" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="620" y1="285" x2="648" y2="285" stroke="#94a3b8" stroke-width="0.4" opacity="0.07">
    <animate attributeName="x1" values="620;630;620" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="648;658;648" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- foreground ground -->
  <path d="M0 298 Q200 292 400 298 Q600 304 800 296 L800 340 L0 340Z" fill="#112a1e"/>

  <!-- main text — fades in last, cinematic -->
  <text x="400" y="110" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="30" fill="#e2e8f0" letter-spacing="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0.9" keyTimes="0;0.5;0.6;0.7;0.8;1" dur="6s" fill="freeze"/>
    Building Beyond the Noise
  </text>

  <!-- thin accent line under text -->
  <line x1="300" y1="122" x2="500" y2="122" stroke="#6C63FF" stroke-width="0.8" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0.3" keyTimes="0;0.55;0.65;0.75;0.85;1" dur="6s" fill="freeze"/>
  </line>
</svg>
