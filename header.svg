<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <rect width="800" height="280" fill="#0a0a0a" rx="10"/>

  <!-- stars -->
  <circle cx="80" cy="25" r="1" fill="#d4a0b0"><animate attributeName="opacity" values=".3;.08;.3" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="220" cy="15" r=".8" fill="#d4a0b0"><animate attributeName="opacity" values=".2;.05;.2" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="30" r="1" fill="#d4a0b0"><animate attributeName="opacity" values=".25;.06;.25" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="560" cy="18" r=".7" fill="#d4a0b0"><animate attributeName="opacity" values=".2;.05;.2" dur="3.6s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="35" r=".9" fill="#d4a0b0"><animate attributeName="opacity" values=".3;.06;.3" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="340" cy="10" r=".6" fill="#d4a0b0"><animate attributeName="opacity" values=".15;.03;.15" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="42" r=".7" fill="#d4a0b0"><animate attributeName="opacity" values=".18;.04;.18" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="640" cy="22" r=".8" fill="#d4a0b0"><animate attributeName="opacity" values=".22;.05;.22" dur="3.8s" repeatCount="indefinite"/></circle>

  <!-- accent line -->
  <line x1="370" y1="80" x2="430" y2="80" stroke="#d4a0b0" stroke-width=".5">
    <animate attributeName="opacity" values=".2;.55;.2" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- main text -->
  <text x="400" y="105" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#94a3b8" letter-spacing="3.5" opacity=".35">
    <animate attributeName="opacity" values=".35;1;1;.35" keyTimes="0;.3;.7;1" dur="4s" repeatCount="indefinite"/>
    building beyond the noise
  </text>

  <!-- three dots -->
  <circle cx="393" cy="122" r="1.5" fill="#d4a0b0"><animate attributeName="opacity" values=".15;.4;.15" dur="2s" repeatCount="indefinite"/><animate attributeName="cy" values="122;120;122" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="122" r="1.5" fill="#d4a0b0"><animate attributeName="opacity" values=".15;.4;.15" dur="2s" begin=".3s" repeatCount="indefinite"/><animate attributeName="cy" values="122;120;122" dur="2s" begin=".3s" repeatCount="indefinite"/></circle>
  <circle cx="407" cy="122" r="1.5" fill="#d4a0b0"><animate attributeName="opacity" values=".15;.4;.15" dur="2s" begin=".6s" repeatCount="indefinite"/><animate attributeName="cy" values="122;120;122" dur="2s" begin=".6s" repeatCount="indefinite"/></circle>

  <!-- distant hills -->
  <path d="M0 210 Q100 185 200 198 Q350 175 450 195 Q580 170 700 190 Q760 182 800 195 L800 280 L0 280Z" fill="#161016" opacity=".6"/>
  <path d="M0 225 Q120 200 250 215 Q400 195 500 212 Q620 190 750 208 Q780 204 800 212 L800 280 L0 280Z" fill="#1a1119" opacity=".85"/>

  <!-- trees left cluster -->
  <line x1="120" y1="218" x2="120" y2="206" stroke="#3a2a30" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="120" cy="203" r="5.5" fill="#2a1828" opacity=".7"><animate attributeName="cy" values="203;200;203" dur="4s" repeatCount="indefinite"/></circle>
  <line x1="142" y1="215" x2="142" y2="206" stroke="#3a2a30" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="142" cy="203" r="4" fill="#251525" opacity=".6"><animate attributeName="cy" values="203;201;203" dur="5s" repeatCount="indefinite"/></circle>

  <!-- house 1 -->
  <rect x="162" y="207" width="22" height="14" fill="#151015" rx="1"/>
  <polygon points="160,207 173,197 186,207" fill="#2a1a25"/>
  <rect x="167" y="211" width="4" height="4" fill="#d4a0b0" rx=".5"><animate attributeName="opacity" values=".4;.75;.4" dur="3.5s" repeatCount="indefinite"/></rect>
  <rect x="175" y="211" width="4" height="4" fill="#d4a0b0" rx=".5"><animate attributeName="opacity" values=".5;.7;.5" dur="4s" repeatCount="indefinite"/></rect>

  <!-- house 2 smaller -->
  <rect x="198" y="210" width="16" height="11" fill="#151015" rx="1"/>
  <polygon points="196,210 206,203 218,210" fill="#28182a"/>
  <rect x="204" y="213" width="3" height="3" fill="#d4a0b0" rx=".5"><animate attributeName="opacity" values=".35;.65;.35" dur="4.5s" repeatCount="indefinite"/></rect>

  <!-- wind turbine 1 -->
  <line x1="350" y1="210" x2="350" y2="175" stroke="#3a2a35" stroke-width="1.5"/>
  <g transform="translate(350,175)">
    <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="5s" repeatCount="indefinite" additive="sum"/>
    <line x1="0" y1="0" x2="0" y2="-14" stroke="#8a6080" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="12.1" y2="7" stroke="#8a6080" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-12.1" y2="7" stroke="#8a6080" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- wind turbine 2 smaller -->
  <line x1="378" y1="212" x2="378" y2="187" stroke="#30202c" stroke-width="1"/>
  <g transform="translate(378,187)">
    <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="7s" repeatCount="indefinite" additive="sum"/>
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#705065" stroke-width=".8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="8.7" y2="5" stroke="#705065" stroke-width=".8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-8.7" y2="5" stroke="#705065" stroke-width=".8" stroke-linecap="round"/>
  </g>

  <!-- solar panels -->
  <rect x="480" y="208" width="14" height="6" fill="#2a1a28" stroke="#3a2a38" stroke-width=".5" rx="1" transform="rotate(-10 487 211)"/>
  <rect x="500" y="209" width="12" height="5" fill="#2a1a28" stroke="#3a2a38" stroke-width=".5" rx="1" transform="rotate(-10 506 211)"/>

  <!-- trees right cluster -->
  <line x1="550" y1="215" x2="550" y2="204" stroke="#3a2a30" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="550" cy="201" r="5" fill="#2a1828" opacity=".65"><animate attributeName="cy" values="201;198;201" dur="4.5s" repeatCount="indefinite"/></circle>
  <line x1="572" y1="213" x2="572" y2="205" stroke="#3a2a30" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="572" cy="202" r="4" fill="#221422" opacity=".55"><animate attributeName="cy" values="202;200;202" dur="3.8s" repeatCount="indefinite"/></circle>

  <!-- house 3 right -->
  <rect x="590" y="204" width="20" height="13" fill="#151015" rx="1"/>
  <polygon points="588,204 600,195 612,204" fill="#251520"/>
  <rect x="595" y="208" width="4" height="4" fill="#d4a0b0" rx=".5"><animate attributeName="opacity" values=".45;.7;.45" dur="3.8s" repeatCount="indefinite"/></rect>
  <rect x="603" y="208" width="4" height="4" fill="#d4a0b0" rx=".5"><animate attributeName="opacity" values=".35;.65;.35" dur="5s" repeatCount="indefinite"/></rect>

  <!-- ground -->
  <path d="M0 245 Q200 238 400 245 Q600 252 800 242 L800 280 L0 280Z" fill="#100c14"/>

  <!-- water shimmer -->
  <path d="M0 252 Q200 246 400 252 Q600 258 800 250 L800 268 Q600 260 400 268 Q200 276 0 266Z" fill="#1a1030" opacity=".3"/>
  <line x1="180" y1="258" x2="215" y2="258" stroke="#d4a0b0" stroke-width=".4" opacity=".1">
    <animate attributeName="x1" values="180;192;180" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="215;227;215" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="450" y1="255" x2="490" y2="255" stroke="#d4a0b0" stroke-width=".4" opacity=".08">
    <animate attributeName="x1" values="450;460;450" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="490;500;490" dur="4s" repeatCount="indefinite"/>
  </line>
  <line x1="620" y1="260" x2="648" y2="260" stroke="#d4a0b0" stroke-width=".4" opacity=".07">
    <animate attributeName="x1" values="620;630;620" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="648;658;648" dur="6s" repeatCount="indefinite"/>
  </line>

  <!-- data network line + dots -->
  <line x1="0" y1="272" x2="800" y2="272" stroke="#d4a0b0" stroke-width=".3" opacity=".06"/>
  <circle cx="200" cy="272" r="1.5" fill="#d4a0b0"><animate attributeName="opacity" values="0;.5;0" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="272" r="1.5" fill="#d4a0b0"><animate attributeName="opacity" values="0;.5;0" dur="3s" begin="1s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="272" r="1.5" fill="#d4a0b0"><animate attributeName="opacity" values="0;.5;0" dur="3s" begin="2s" repeatCount="indefinite"/></circle>
</svg>
